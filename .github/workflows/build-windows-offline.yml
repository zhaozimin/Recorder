# ============================================================================
#  VoiceLog · Windows 全离线版 CI（模型打进安装包，零联网即用）
#  从本项目 `models` Release 下载 CT2 模型 → 设 VOICELOG_BUNDLE_MODEL → PyInstaller 打进包
#  → Inno Setup 出 VoiceLog-x.y.z-offline-Setup.exe（~1.8G）。手动触发。
#  前提：`models` Release 已有 whisper-ct2-turbo.zip。
# ============================================================================
name: Build Windows Offline (model bundled)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/windows/requirements-windows.txt
          pip install pyinstaller

      - name: Fetch bundled model from models release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release download models -p whisper-ct2-turbo.zip -D model_dl
          Expand-Archive -Path model_dl/whisper-ct2-turbo.zip -DestinationPath model_ext -Force

      - name: Build app with model bundled
        env:
          VOICELOG_BUNDLE_MODEL: ${{ github.workspace }}\model_ext\whisper-ct2-turbo
        run: pyinstaller --noconfirm packaging/windows/VoiceLog-win.spec

      - name: Build installer (Inno Setup) + rename offline
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss
          Get-ChildItem packaging\windows\Output\*-Setup.exe | Rename-Item -NewName { $_.Name -replace '-Setup','-offline-Setup' }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLog-Windows-Offline-Setup
          path: packaging/windows/Output/*.exe
          if-no-files-found: error
